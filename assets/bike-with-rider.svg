<!--
  bike-with-rider.svg — preproduction page (the bike that rides past bricks).

  REQUIRED structure for animations to work after you replace this file:
    • outer <svg> with viewBox="0 0 160 130"
    • <g class="bike-frame">         outer wrapper for the bike (anything inside is fine)
        <circle class="bike-wheel bike-wheel--rear">    rear wheel (will rotate)
        <circle class="bike-wheel bike-wheel--front">   front wheel (will rotate)
    • <g class="bike-rider">         rider (its opacity is toggled to 0 on crash)

  Anything else inside (frame lines, basket, etc.) is up to you. As long as
  the wheels have those two classes and the rider is in a group with
  class="bike-rider", the page will keep working.
-->
<svg viewBox="0 0 160 130" xmlns="http://www.w3.org/2000/svg">
  <g class="bike-frame" fill="none" stroke="#f3ebe0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <circle class="bike-wheel bike-wheel--rear"  cx="38"  cy="100" r="20"/>
    <circle class="bike-wheel bike-wheel--front" cx="122" cy="100" r="20"/>
    <line x1="38"  y1="80"  x2="38"  y2="120" stroke-width="1.4"/>
    <line x1="18"  y1="100" x2="58"  y2="100" stroke-width="1.4"/>
    <line x1="122" y1="80"  x2="122" y2="120" stroke-width="1.4"/>
    <line x1="102" y1="100" x2="142" y2="100" stroke-width="1.4"/>
    <path d="M38 100 L78 100 L96 60 L122 100 M78 100 L88 56 L102 56 M96 60 L88 56"/>
    <circle cx="78" cy="100" r="2.8" fill="#b94a2a" stroke="none"/>
  </g>
  <g class="bike-rider" stroke="#f3ebe0" stroke-width="2.4" stroke-linecap="round" fill="none">
    <circle cx="92" cy="22" r="9" fill="#f3ebe0" stroke="#1a1614" stroke-width="1.5"/>
    <line x1="92" y1="31" x2="92" y2="58"/>
    <line x1="92" y1="40" x2="102" y2="56"/>
    <line x1="92" y1="40" x2="80"  y2="50"/>
    <line x1="92" y1="58" x2="78"  y2="92"/>
    <line x1="92" y1="58" x2="84"  y2="98"/>
  </g>
</svg>
