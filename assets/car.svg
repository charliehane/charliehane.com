<!--
  car.svg — the still car the bike crashes into on preproduction.

  Just needs viewBox="0 0 220 130". Nothing inside is animated, so you can
  replace freely. Keep the visual proportions roughly similar so the crash
  alignment still reads.
-->
<svg viewBox="0 0 220 130" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="110" cy="120" rx="100" ry="6" fill="#000" opacity="0.35"/>
  <path d="M30 80 L48 50 L160 50 L188 80 Z" fill="#b94a2a" stroke="#1a1614" stroke-width="2"/>
  <rect x="14" y="78" width="190" height="32" rx="6" fill="#b94a2a" stroke="#1a1614" stroke-width="2"/>
  <rect x="56" y="56" width="40" height="22" fill="#a0c4d0" stroke="#1a1614" stroke-width="1.5"/>
  <rect x="108" y="56" width="40" height="22" fill="#a0c4d0" stroke="#1a1614" stroke-width="1.5"/>
  <line x1="100" y1="56" x2="100" y2="78" stroke="#1a1614" stroke-width="2"/>
  <circle cx="50"  cy="110" r="14" fill="#1a1614"/>
  <circle cx="50"  cy="110" r="6"  fill="#5a5a5a"/>
  <circle cx="170" cy="110" r="14" fill="#1a1614"/>
  <circle cx="170" cy="110" r="6"  fill="#5a5a5a"/>
  <rect x="0"   y="86" width="14" height="6" fill="#f4d860"/>
  <rect x="206" y="86" width="14" height="6" fill="#c41818"/>
</svg>
