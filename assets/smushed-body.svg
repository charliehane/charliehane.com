<!--
  smushed-body.svg — the splatted/flattened figure that lands on the
  concrete floor on production. viewBox="0 0 80 30".

  No animation hooks needed. Anything horizontally-flat with a hint of
  blood works. Keep it WIDE (80 units) and SHORT (30 units) so it reads as
  a body that hit the ground hard.
-->
<svg viewBox="0 0 80 30" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="40" cy="22" rx="36" ry="6" fill="#1a1614" opacity="0.85"/>
  <circle cx="22" cy="20" r="6" fill="#1a1614"/>
  <line x1="22" y1="20" x2="58" y2="22" stroke="#1a1614" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="22" x2="20" y2="14" stroke="#1a1614" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="44" y1="22" x2="56" y2="14" stroke="#1a1614" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="50" y1="22" x2="60" y2="28" stroke="#1a1614" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="54" y1="22" x2="66" y2="28" stroke="#1a1614" stroke-width="2.4" stroke-linecap="round"/>
  <ellipse cx="40" cy="26" rx="44" ry="3" fill="#8a0808" opacity="0.85"/>
  <ellipse cx="60" cy="27" rx="14" ry="2.5" fill="#c41818" opacity="0.85"/>
  <ellipse cx="20" cy="27" rx="10" ry="2.5" fill="#c41818" opacity="0.85"/>
  <circle cx="68" cy="22" r="2" fill="#c41818"/>
  <circle cx="14" cy="20" r="2" fill="#c41818"/>
  <circle cx="76" cy="26" r="1.5" fill="#c41818"/>
</svg>
